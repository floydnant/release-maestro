<div class="settings-item">
    <p class="type-label-sm text-content-muted uppercase">Apple Mail</p>
    <h1 class="type-section-title text-content-primary mt-1">Mailbox import</h1>
    <label class="type-label-md text-content-primary block mt-6" for="setting-mailboxName-input"
        >Mailbox Name</label
    >
    <p class="description | type-body-sm text-content-muted mt-1" id="setting-mailboxName-description">
        The name of the mailbox to import from Apple Mail.
    </p>

    <input
        class="input mt-3 w-full max-w-xs"
        id="setting-mailboxName-input"
        aria-describedby="setting-mailboxName-description"
        [(ngModel)]="mailboxName"
        placeholder="Not set"
    />
</div>

@if (hasChanges()) {
    <hr class="mt-6" />

    <button class="btn-primary" (click)="saveSettings()">Save</button>
}

<div class="settings-item">
    <p class="type-label-sm uppercase text-content-muted">Apple Mail</p>
    <h1 class="type-section-title mt-1 text-content-primary">Mailbox import</h1>
    <label class="type-label-md mt-6 block text-content-primary" for="setting-mailboxName-input"
        >Mailbox Name</label
    >
    <p class="description | type-body-sm mt-1 text-content-muted" id="setting-mailboxName-description">
        The name of the mailbox to import from Apple Mail.
    </p>

    <input
        class="input mt-3 w-full max-w-xs"
        id="setting-mailboxName-input"
        aria-describedby="setting-mailboxName-description"
        [(ngModel)]="mailboxName"
        placeholder="Not set"
    />
</div>

@if (hasChanges()) {
    <hr class="mt-6" />

    <button class="btn-primary" (click)="saveSettings()">Save</button>
}

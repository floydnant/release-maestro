name: 'Quality'

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read

jobs:
    format:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-node

            - name: Check formatting
              run: make format-check

    lint:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-node

            - name: Check lint
              run: make lint

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-node

            - name: Run unit tests
              run: make test

    e2e:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: ./.github/actions/setup-node
            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Run e2e tests
              run: make e2e